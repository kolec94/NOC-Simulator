<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NOC - World Map</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<canvas id="c"></canvas>
<script src="lib/params.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const rng = NOC.rng;
const speed = NOC.params.speed;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Rough continent silhouettes, defined on a 1000x500 reference grid.
// Not geographically precise -- just recognizable blobs.
const CONTINENTS = [
    // North America
    [[90,70],[150,55],[210,60],[250,90],[270,130],[250,170],[230,200],
     [200,230],[170,240],[150,210],[120,230],[95,200],[70,160],[60,120],[70,90]],
    // South America
    [[190,270],[230,260],[255,290],[260,340],[245,400],[220,440],[200,430],
     [190,380],[175,330],[170,300]],
    // Europe
    [[440,70],[490,60],[520,80],[510,110],[480,120],[450,110],[430,90]],
    // Africa
    [[450,140],[510,130],[540,170],[545,230],[520,300],[490,340],[465,330],
     [450,280],[435,220],[430,180]],
    // Asia
    [[560,50],[650,40],[750,60],[820,90],[850,130],[820,170],[770,180],
     [720,160],[680,190],[630,180],[590,150],[560,110],[550,80]],
    // Australia
    [[760,320],[820,310],[850,340],[840,370],[800,380],[765,365],[755,340]]
];

let W = 1000, H = 500; // reference grid size
function mapToScreen(pt, w, h) {
    const pad = 0.08;
    const sx = (pt[0] / W) * w * (1 - 2 * pad) + w * pad;
    const sy = (pt[1] / H) * h * (1 - 2 * pad) + h * pad;
    return [sx, sy];
}

// Threat arc endpoints picked at random points inside continent bounding
// boxes so arcs look like they originate/terminate on land.
function randomPointOnLand() {
    const poly = CONTINENTS[Math.floor(rng() * CONTINENTS.length)];
    const p = poly[Math.floor(rng() * poly.length)];
    // jitter slightly so points aren't always exact vertices
    return [p[0] + (rng() - 0.5) * 20, p[1] + (rng() - 0.5) * 20];
}

let threatCount = 0;
const arcs = []; // {from, to, t, life}

function spawnArc() {
    const from = randomPointOnLand();
    let to = randomPointOnLand();
    let tries = 0;
    while (Math.hypot(to[0] - from[0], to[1] - from[1]) < 80 && tries < 10) {
        to = randomPointOnLand();
        tries++;
    }
    arcs.push({ from, to, t: 0, life: 1.4 + rng() * 0.8 });
    threatCount++;
}

let spawnTimer = 0;

function drawContinents(w, h) {
    ctx.fillStyle = "rgba(0,0,0,0)";
    ctx.strokeStyle = NOC.color(60, 35);
    ctx.fillStyle = NOC.color(40, 12);
    ctx.lineWidth = 1.5;
    CONTINENTS.forEach(poly => {
        ctx.beginPath();
        poly.forEach((pt, i) => {
            const [x, y] = mapToScreen(pt, w, h);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    });
}

function drawGrid(w, h) {
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 1;
    for (let i = 1; i < 12; i++) {
        const x = (i / 12) * w;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let i = 1; i < 6; i++) {
        const y = (i / 6) * h;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
}

function drawArc(w, h, arc) {
    const [fx, fy] = mapToScreen(arc.from, w, h);
    const [tx, ty] = mapToScreen(arc.to, w, h);
    const mx = (fx + tx) / 2;
    const my = (fy + ty) / 2 - Math.hypot(tx - fx, ty - fy) * 0.25;

    const progress = Math.min(1, arc.t / arc.life);
    const fadeIn = Math.min(1, arc.t / 0.2);
    const fadeOut = arc.t > arc.life - 0.4 ? Math.max(0, (arc.life - arc.t) / 0.4) : 1;
    const alpha = fadeIn * fadeOut;

    // trail: draw the curve up to `progress`
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = NOC.color(100, 60);
    ctx.lineWidth = 2;
    ctx.beginPath();
    const steps = 40;
    const cut = Math.floor(steps * progress);
    for (let i = 0; i <= cut; i++) {
        const t = i / steps;
        const x = (1 - t) * (1 - t) * fx + 2 * (1 - t) * t * mx + t * t * tx;
        const y = (1 - t) * (1 - t) * fy + 2 * (1 - t) * t * my + t * t * ty;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();

    // origin dot (always visible while arc alive)
    drawPulseDot(fx, fy, alpha * 0.8, "#f33");

    // destination pulse dot -- grows as arc approaches
    if (progress > 0.05) {
        drawPulseDot(tx, ty, alpha, "#ff3");
    }
}

function drawPulseDot(x, y, alpha, colorHex) {
    const pulse = 4 + Math.sin(performance.now() / 200) * 2;
    ctx.save();
    ctx.globalAlpha = alpha * 0.4;
    ctx.beginPath();
    ctx.arc(x, y, pulse + 6, 0, Math.PI * 2);
    ctx.fillStyle = colorHex;
    ctx.fill();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = colorHex;
    ctx.fill();
    ctx.restore();
}

let lastTime = performance.now();

function draw() {
    const now = performance.now();
    const dt = Math.min(0.1, (now - lastTime) / 1000) * speed;
    lastTime = now;

    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    drawGrid(w, h);
    drawContinents(w, h);

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
        spawnArc();
        spawnTimer = 0.5 + rng() * 1.2;
    }

    for (let i = arcs.length - 1; i >= 0; i--) {
        const arc = arcs[i];
        arc.t += dt;
        drawArc(w, h, arc);
        if (arc.t > arc.life) arcs.splice(i, 1);
    }

    // header / overlay
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, w, 44);
    ctx.fillStyle = NOC.color(100, 60);
    ctx.font = "bold 20px monospace";
    ctx.fillText(NOC.params.title, 16, 28);

    ctx.font = "bold 18px monospace";
    ctx.fillStyle = "#f55";
    const label = "THREATS DETECTED: " + threatCount;
    const tw = ctx.measureText(label).width;
    ctx.fillText(label, w - tw - 16, 28);

    ctx.font = "14px monospace";
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.fillText("ACTIVE VECTORS: " + arcs.length, 16, h - 16);

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

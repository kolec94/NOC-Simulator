<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NOC - Matrix</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<canvas id="c"></canvas>
<script src="lib/params.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const rng = NOC.rng;
const speed = NOC.params.speed;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const fontSize = 22;
const chars = "0123456789ABCDEFXYZ$+-*/<>#@%&";
let columns = Math.floor(canvas.width / fontSize);
let drops = new Array(columns).fill(0).map(() => rng() * -50);

function draw() {
    columns = Math.floor(canvas.width / fontSize);
    while (drops.length < columns) drops.push(rng() * -50);

    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = fontSize + "px monospace";
    for (let i = 0; i < columns; i++) {
        const ch = chars[Math.floor(rng() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillStyle = "#fff";
        ctx.fillText(ch, x, y);
        ctx.fillStyle = NOC.color(100, 50);
        ctx.fillText(chars[Math.floor(rng() * chars.length)], x, y - fontSize);

        if (y > canvas.height && rng() > 0.975) {
            drops[i] = 0;
        }
        drops[i] += speed;
    }

    ctx.font = "16px monospace";
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.fillText(NOC.params.title, 12, canvas.height - 12);

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

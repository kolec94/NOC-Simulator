<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NOC Simulator — Viewer</title>
<style>
:root {
    --accent: #34d399;
    --text: #e6edf3;
    --muted: #8b98a9;
    --border: rgba(255, 255, 255, 0.12);
}
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}
video {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
}
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 18px 24px 26px;
    background: linear-gradient(rgba(4, 8, 12, 0.92), rgba(4, 8, 12, 0.65) 60%, transparent);
    color: var(--text);
    transition: opacity 0.4s;
    backdrop-filter: blur(2px);
}
#overlay.hidden { opacity: 0; pointer-events: none; }

#top-row {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}
#current-label {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(52, 211, 153, 0.35);
}
#rotate-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
}
#rotate-controls input[type="number"] {
    width: 52px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 6px;
    font-size: 13px;
}
/* toggle switch */
.switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch .track {
    position: absolute; inset: 0;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 999px;
    transition: background 0.2s;
    cursor: pointer;
}
.switch .track::before {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
}
.switch input:checked + .track { background: var(--accent); }
.switch input:checked + .track::before { transform: translateX(16px); }

#screen-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 32vh;
    overflow-y: auto;
}
#screen-list li {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    transition: all 0.15s;
}
#screen-list li:hover { background: rgba(255, 255, 255, 0.14); }
#screen-list li.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(52, 211, 153, 0.25);
}
#screen-list li label {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    padding: 5px 12px;
}
#screen-list li input[type="checkbox"] {
    cursor: pointer;
    accent-color: var(--accent);
    margin: 0;
}
#hint {
    position: fixed;
    bottom: 12px;
    right: 16px;
    color: rgba(255, 255, 255, 0.4);
    font-size: 12px;
}
</style>
</head>
<body>
<video id="video" autoplay muted playsinline></video>

<div id="overlay">
    <div id="top-row">
        <div id="current-label">Loading…</div>
        <div id="rotate-controls">
            <label class="switch">
                <input type="checkbox" id="rotate-toggle">
                <span class="track"></span>
            </label>
            <span>Auto-rotate every</span>
            <input type="number" id="rotate-interval" min="1" value="15">
            <span>sec</span>
        </div>
    </div>
    <ul id="screen-list"></ul>
</div>
<div id="hint">←/→ switch · move mouse for list · checkbox = skip in rotation</div>

<script src="/vendor/hls.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>

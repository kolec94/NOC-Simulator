<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NOC Simulator - Viewer</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, Segoe UI, Arial, sans-serif;
}
video {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
}
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px 20px;
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0));
    color: #eee;
    transition: opacity 0.4s;
}
#overlay.hidden {
    opacity: 0;
    pointer-events: none;
}
#current-label {
    font-size: 20px;
    font-weight: bold;
    color: #7CFC00;
    margin-bottom: 10px;
}
#screen-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 30vh;
    overflow-y: auto;
}
#screen-list li {
    padding: 5px 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid #444;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
}
#screen-list li:hover { background: rgba(255,255,255,0.18); }
#screen-list li.active { border-color: #7CFC00; color: #7CFC00; }
#hint {
    position: fixed;
    bottom: 12px;
    right: 16px;
    color: #888;
    font-size: 12px;
}
</style>
</head>
<body>
<video id="video" autoplay muted playsinline></video>

<div id="overlay">
    <div id="current-label">Loading...</div>
    <ul id="screen-list"></ul>
</div>
<div id="hint">Left/Right arrows to switch. Move mouse to show list.</div>

<script src="/vendor/hls.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>
